<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Latein-GFS – Beitreten</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <h1>🌋 Vesuv-Übersetzungswettbewerb</h1>
      <p>Plinius an Tacitus – übersetze Satz für Satz auf Zeit!</p>
    </div>

    <div class="card">
      <h2>Tritt der Runde bei</h2>
      <p class="muted">Gib einen Nickname ein. Du übersetzt 4 lateinische Sätze
        nacheinander. Schnelligkeit und Richtigkeit bringen Punkte – Hilfen kosten Punkte.</p>
      <label for="nick">Dein Nickname</label>
      <input type="text" id="nick" maxlength="24" placeholder="z. B. CaesarXIII" autofocus>
      <p id="err" class="feedback bad hidden"></p>
      <div class="row" style="margin-top:14px">
        <button class="btn primary block" id="joinBtn">Los geht's!</button>
      </div>
    </div>

    <p class="center muted">Bist du Lehrkraft/Admin? → <a href="/admin">Admin-Panel</a></p>
  </div>
  <script src="/static/join.js"></script>
</body>
</html>
